<svg viewBox="0 0 680 430" role="img" aria-label="Johnson 2016 perceptual loss training framework" xmlns="http://www.w3.org/2000/svg">
  <title>Johnson 2016 感知损失训练框架</title>
  <style>
    .th{font:700 15px "Noto Sans SC",Arial,sans-serif;fill:#0f2d52}
    .ts{font:500 11px "Noto Sans SC",Arial,sans-serif;fill:#64748b}
  </style>
  <defs><marker id="arJ" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
  <rect width="680" height="430" rx="18" fill="#fbfdff"/>
  <rect x="32" y="86" width="70" height="44" rx="8" fill="#EFE8D9" stroke="#B4B2A9" stroke-width="1"/>
  <text class="th" x="67" y="108" text-anchor="middle" dominant-baseline="central">输入 x</text>

  <rect x="128" y="38" width="390" height="142" rx="12" fill="#E2EDF7" stroke="#1C5C96" stroke-width="1.1"/>
  <text class="th" x="323" y="60" text-anchor="middle" dominant-baseline="central">变换网络 f_W（可训练）</text>
  <text class="ts" x="323" y="80" text-anchor="middle" dominant-baseline="central">图像变换 CNN，不是 ResNet 分类器</text>

  <rect x="144" y="104" width="56" height="48" rx="6" fill="#F6F1E7" stroke="#1C5C96" stroke-width="0.9"/>
  <text class="ts" x="172" y="122" text-anchor="middle" dominant-baseline="central">输入卷积</text>
  <text class="ts" x="172" y="140" text-anchor="middle" dominant-baseline="central">9×9</text>
  <rect x="211" y="104" width="70" height="48" rx="6" fill="#F6F1E7" stroke="#1C5C96" stroke-width="0.9"/>
  <text class="ts" x="246" y="122" text-anchor="middle" dominant-baseline="central">下采样</text>
  <text class="ts" x="246" y="140" text-anchor="middle" dominant-baseline="central">stride 2 ×2</text>
  <rect x="292" y="104" width="78" height="48" rx="6" fill="#ECE9FB" stroke="#6B5DD3" stroke-width="1.1"/>
  <text class="ts" x="331" y="122" text-anchor="middle" dominant-baseline="central">Residual</text>
  <text class="ts" x="331" y="140" text-anchor="middle" dominant-baseline="central">blocks ×5</text>
  <text class="ts" x="331" y="166" text-anchor="middle" dominant-baseline="central">每块含 skip / 跳连</text>
  <rect x="381" y="104" width="70" height="48" rx="6" fill="#F6F1E7" stroke="#1C5C96" stroke-width="0.9"/>
  <text class="ts" x="416" y="122" text-anchor="middle" dominant-baseline="central">上采样</text>
  <text class="ts" x="416" y="140" text-anchor="middle" dominant-baseline="central">×2 ×2</text>
  <rect x="462" y="104" width="42" height="48" rx="6" fill="#F6F1E7" stroke="#1C5C96" stroke-width="0.9"/>
  <text class="ts" x="483" y="122" text-anchor="middle" dominant-baseline="central">输出</text>
  <text class="ts" x="483" y="140" text-anchor="middle" dominant-baseline="central">conv</text>
  <line x1="200" y1="128" x2="211" y2="128" stroke="#7C7565" stroke-width="1.2" marker-end="url(#arJ)"/>
  <line x1="281" y1="128" x2="292" y2="128" stroke="#7C7565" stroke-width="1.2" marker-end="url(#arJ)"/>
  <line x1="370" y1="128" x2="381" y2="128" stroke="#7C7565" stroke-width="1.2" marker-end="url(#arJ)"/>
  <line x1="451" y1="128" x2="462" y2="128" stroke="#7C7565" stroke-width="1.2" marker-end="url(#arJ)"/>

  <rect x="558" y="86" width="78" height="44" rx="8" fill="#E1F0EA" stroke="#1E8268" stroke-width="1"/>
  <text class="th" x="597" y="108" text-anchor="middle" dominant-baseline="central">输出 ŷ</text>
  <rect x="330" y="244" width="76" height="44" rx="8" fill="#EFE8D9" stroke="#B4B2A9" stroke-width="1"/>
  <text class="th" x="368" y="266" text-anchor="middle" dominant-baseline="central">目标 y</text>

  <rect x="478" y="210" width="160" height="112" rx="12" fill="#F1EFE8" stroke="#888780" stroke-width="1" stroke-dasharray="5 4"/>
  <text class="th" x="558" y="232" text-anchor="middle" dominant-baseline="central">冻结 VGG φ</text>
  <text class="ts" x="558" y="250" text-anchor="middle" dominant-baseline="central">loss network · 不更新</text>
  <rect x="532" y="272" width="62" height="30" rx="4" fill="#E1F0EA" stroke="#1E8268" stroke-width="0.8"/>
  <rect x="525" y="278" width="62" height="30" rx="4" fill="#E1F0EA" stroke="#1E8268" stroke-width="0.8"/>
  <rect x="518" y="284" width="62" height="30" rx="4" fill="#E1F0EA" stroke="#1E8268" stroke-width="0.8"/>

  <rect x="478" y="352" width="160" height="54" rx="8" fill="#F7E7DD" stroke="#C0532A" stroke-width="1"/>
  <text class="th" x="558" y="372" text-anchor="middle" dominant-baseline="central">感知损失 ℓ</text>
  <text class="ts" x="558" y="391" text-anchor="middle" dominant-baseline="central">比较两组 VGG 特征</text>

  <line x1="102" y1="108" x2="128" y2="108" stroke="#7C7565" stroke-width="1.5" marker-end="url(#arJ)"/>
  <line x1="518" y1="108" x2="558" y2="108" stroke="#7C7565" stroke-width="1.5" marker-end="url(#arJ)"/>
  <path d="M597 130 L597 186 L558 210" fill="none" stroke="#7C7565" stroke-width="1.5" marker-end="url(#arJ)"/>
  <line x1="406" y1="266" x2="478" y2="270" stroke="#7C7565" stroke-width="1.5" marker-end="url(#arJ)"/>
  <line x1="558" y1="322" x2="558" y2="352" stroke="#7C7565" stroke-width="1.5" marker-end="url(#arJ)"/>
  <path d="M478 386 L323 386 L323 180" fill="none" stroke="#1C5C96" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arJ)"/>
  <text class="ts" x="323" y="378" text-anchor="middle" style="fill:#0C447C">梯度穿过 VGG，只更新 f_W</text>
</svg>
