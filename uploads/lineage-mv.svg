<svg viewBox="0 0 680 396" role="img" aria-label="Mahendran and Vedaldi feature inversion optimization loop" xmlns="http://www.w3.org/2000/svg">
  <title>M&amp;V 特征反演的优化循环</title>
  <desc>随机噪声图过冻结CNN得到特征，与原图目标特征比较得到特征重建损失，梯度回传只更新噪声图像素，循环数百次直到收敛。</desc>
  <style>
    .th{font:700 14px "Noto Sans SC",Arial,sans-serif;fill:#23201A}
    .ts{font:500 12px "Noto Sans SC",Arial,sans-serif;fill:#4A453B}
    .mn{font:500 12.5px "JetBrains Mono",Consolas,monospace;fill:#23201A}
  </style>
  <defs>
    <marker id="arMvLoop" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="680" height="396" rx="18" fill="#fbfdff"/>
  <text x="340" y="28" text-anchor="middle" class="th">M&amp;V：最小化特征重建损失 = 只优化图像像素的循环</text>

  <rect x="40" y="62" width="110" height="74" rx="8" fill="#ECE9FB" stroke="#6B5DD3" stroke-width="1.4"/>
  <text class="th" x="95" y="90" text-anchor="middle" dominant-baseline="central">随机图 x̂</text>
  <text class="ts" x="95" y="110" text-anchor="middle" dominant-baseline="central" style="fill:#6B5DD3">被优化的对象</text>

  <rect x="196" y="68" width="104" height="62" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1" stroke-dasharray="5 4"/>
  <text class="th" x="248" y="92" text-anchor="middle" dominant-baseline="central">冻结 CNN φ</text>
  <text class="ts" x="248" y="110" text-anchor="middle" dominant-baseline="central">不更新</text>

  <rect x="346" y="72" width="98" height="54" rx="8" fill="#E1F0EA" stroke="#1E8268" stroke-width="1"/>
  <text class="mn" x="395" y="99" text-anchor="middle" dominant-baseline="central">φⱼ(x̂)</text>

  <rect x="40" y="232" width="110" height="74" rx="8" fill="#EFE8D9" stroke="#B4B2A9" stroke-width="1"/>
  <text class="th" x="95" y="262" text-anchor="middle" dominant-baseline="central">原图 x₀</text>
  <text class="ts" x="95" y="282" text-anchor="middle" dominant-baseline="central">目标图</text>

  <rect x="196" y="238" width="104" height="62" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1" stroke-dasharray="5 4"/>
  <text class="th" x="248" y="262" text-anchor="middle" dominant-baseline="central">同一个 φ</text>
  <text class="ts" x="248" y="280" text-anchor="middle" dominant-baseline="central">只提特征</text>

  <rect x="346" y="242" width="98" height="54" rx="8" fill="#E1F0EA" stroke="#1E8268" stroke-width="1"/>
  <text class="mn" x="395" y="263" text-anchor="middle" dominant-baseline="central">φⱼ(x₀)</text>
  <text class="ts" x="395" y="320" text-anchor="middle" style="fill:#5F5E5A">只算一次，固定不动</text>

  <rect x="488" y="142" width="152" height="84" rx="8" fill="#F7E7DD" stroke="#C0532A" stroke-width="1.2"/>
  <text class="th" x="564" y="164" text-anchor="middle" dominant-baseline="central">特征重建损失</text>
  <text class="mn" x="564" y="190" text-anchor="middle" dominant-baseline="central" style="font-size:12px">‖φⱼ(x̂)−φⱼ(x₀)‖²</text>
  <text class="ts" x="564" y="210" text-anchor="middle" dominant-baseline="central">差距越小越好</text>

  <line x1="150" y1="99" x2="196" y2="99" stroke="#7C7565" stroke-width="1.5" marker-end="url(#arMvLoop)"/>
  <line x1="300" y1="99" x2="346" y2="99" stroke="#7C7565" stroke-width="1.5" marker-end="url(#arMvLoop)"/>
  <line x1="150" y1="269" x2="196" y2="269" stroke="#7C7565" stroke-width="1.5" marker-end="url(#arMvLoop)"/>
  <line x1="300" y1="269" x2="346" y2="269" stroke="#7C7565" stroke-width="1.5" marker-end="url(#arMvLoop)"/>
  <path d="M444 99 L466 99 L466 162 L488 162" fill="none" stroke="#7C7565" stroke-width="1.5" marker-end="url(#arMvLoop)"/>
  <path d="M444 269 L466 269 L466 206 L488 206" fill="none" stroke="#7C7565" stroke-width="1.5" marker-end="url(#arMvLoop)"/>

  <path d="M488 184 L24 184 L24 99 L40 99" fill="none" stroke="#6B5DD3" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#arMvLoop)"/>
  <text class="th" x="250" y="176" text-anchor="middle" style="fill:#534AB7">梯度下降：只更新 x̂ 的像素，CNN 全程不动</text>
  <text class="ts" x="95" y="150" text-anchor="middle" style="fill:#534AB7">重复数百次 → 收敛 = 反演结果</text>
</svg>
